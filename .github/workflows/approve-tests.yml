name: Approve AI Tests

on:
  issue_comment:
    types: [created]

jobs:
  merge-tests:
    if: ${{ github.event.issue.pull_request && github.event.comment.body == '/add-tests' && github.event.comment.user.login == github.event.issue.user.login }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Get PR Details
        id: pr-data
        run: |
          PR_JSON=$(gh pr view ${{ github.event.issue.number }} --json headRefName)
          echo "BRANCH_NAME=$(echo $PR_JSON | jq -r .headRefName)" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH_NAME }}

      - name: Download Test File via GitHub API
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          mkdir -p tests
          
          # Fetch the raw file directly via GitHub API from the temporary AI branch and decode it
          gh api repos/${{ github.repository }}/contents/tests/ai_generated.test.js?ref=ai-tests-pr-${{ github.event.issue.number }} --jq '.content' | base64 -d > tests/ai_generated.test.js
          
          # Stage, commit, and push the file cleanly into the PR branch
          git add tests/ai_generated.test.js
          git commit -m "Build: Embedded Gemini auto-generated test cases" || echo "No changes to commit"
          git push origin ${{ env.BRANCH_NAME }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Confirm Merge
        run: |
          gh pr comment ${{ github.event.issue.number }} --body "✅ Tests successfully committed to your branch!"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
