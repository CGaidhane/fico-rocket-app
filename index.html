/* =====================================================================
   STORAGE — bulletproof for Android WebView
   Writes localStorage SYNCHRONOUSLY on every change (primary, survives
   app kill), mirrors to window.storage (Claude runtime) + memory.
   ===================================================================== */
const MEM={};
const KEY='ficoQuestM1';
const Store={
  read(){
    try{const v=localStorage.getItem(KEY);if(v!==null)return v;}catch(e){}
    return (KEY in MEM)?MEM[KEY]:null;
  },
  write(v){
    MEM[KEY]=v;
    try{localStorage.setItem(KEY,v);}catch(e){}
    try{if(window.storage&&window.storage.set)window.storage.set(KEY,v);}catch(e){} // async mirror, fire & forget
  },
  async readAsync(){
    try{if(window.storage&&window.storage.get){const r=await window.storage.get(KEY);if(r&&r.value)return r.value;}}catch(e){}
    return Store.read();
  }
};

/* STATE — currency is "coins" = rupees (no XP, per request) */

/* =====================================================================
   HAPTICS + SYNTHESIZED AUDIO (self-contained, no external files)
   ===================================================================== */
function haptic(p){try{if(navigator.vibrate)navigator.vibrate(p);}catch(e){}}
let AC=null,_audioReady=false;
function ensureAudio(){
  if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  if(AC&&AC.state==='suspended'){AC.resume().catch(()=>{});}
  _audioReady=!!AC;
}
function beep(freq,dur,type,vol,when){
  if(!S.sound||!AC)return;
  type=type||'sine';vol=vol==null?0.07:vol;when=when||0;
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=type;o.frequency.value=freq;
  const t=AC.currentTime+when;
  o.connect(g);g.connect(AC.destination);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.linearRampToValueAtTime(vol,t+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.start(t);o.stop(t+dur+0.03);
}

function earn(amount, reason, sound){
  if(sound===undefined)sound=true;
  const before=curLevel().name;
  S.coins+=amount; save();
  const after=curLevel().name;
  paintHeader();
  if(before!==after){haptic([30,30,30]);levelUp(curLevel());}
  else {if(sound)sndCoin();toast('+₹'+amount, reason||'Treasure collected!', '💰');}
}
function levelUp(lvl){
  confetti();sndComplete();
  showModal('<div class="p-7 text-center">'+
    '<div class="text-6xl mb-3 pop">'+lvl.emoji+'</div>'+
    '<p class="text-xs uppercase tracking-widest text-amber-500 font-bold">✨ New rank reached ✨</p>'+
    '<h3 class="text-2xl font-extrabold mt-1 gradtext">'+lvl.name+'</h3>'+
    '<p class="text-sm font-semibold text-amber-600 mt-1">You have entered '+lvl.realm+'</p>'+
    '<p class="text-slate-500 dark:text-slate-400 mt-2 text-sm">'+lvl.blurb+'</p>'+
    '<button onclick="closeModal()" class="tap mt-5 px-6 py-3 rounded-xl gradbg text-white font-bold">Onward 🚀</button></div>');
}
function awardBadge(id){
  if(S.badges.includes(id))return;
  S.badges.push(id); save();
  const b=BADGES[id]; confetti(); haptic([30,30,30]); sndComplete();
  toast('Trophy won: '+b.t, b.d, b.e);
  if(curView==='dashboard') rerender();
}
function checkStreakBadge(){if(S.streak>=7) awardBadge('streak7');}

/* completion + checkboxes */
function isDone(k){return S.done.includes(k);}
function toggleDone(key, coins, label){
  coins=coins||10;
  const i=S.done.indexOf(key);
  if(i<0){
    S.done.push(key);
    if(!S.claimed.includes(key)){S.claimed.push(key);save();earn(coins,label||'Marked complete');}
    else {save();sndCorrect();}
  } else {S.done.splice(i,1);save();haptic(15);}
  checkProgressBadges();
  rerender();
}
function checkProgressBadges(){
  if(S.done.filter(k=>k.indexOf('fico:')===0).length>=12) awardBadge('fico');
  if(S.done.filter(k=>k.indexOf('qa:')===0).length>=4) awardBadge('qa');
}
function doneCount(prefix,total){const n=S.done.filter(k=>k.indexOf(prefix)===0).length;return Math.min(n,total);}

function toast(title, sub, emoji){
  const wrap=document.getElementById('toasts');
  const el=document.createElement('div');
  el.className='toast pointer-events-auto flex items-center gap-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-xl rounded-xl px-4 py-3 max-w-xs';
  el.innerHTML='<div class="text-2xl">'+(emoji||'✨')+'</div><div><div class="font-bold text-sm">'+title+'</div>'+(sub?'<div class="text-xs text-slate-500 dark:text-slate-400">'+sub+'</div>':'')+'</div>';
  wrap.appendChild(el);
  setTimeout(function(){el.style.transition='all .4s';el.style.opacity='0';el.style.transform='translateY(10px)';setTimeout(function(){el.remove();},400);},2500);
}

function confetti(){
  const cv=document.getElementById('cfx'); cv.classList.remove('hidden');
  const ctx=cv.getContext('2d'); cv.width=innerWidth; cv.height=innerHeight;
  const cols=['#0066CC','#22d3ee','#f5c518','#22c55e','#ec4899','#a855f7'];
  let P=Array.from({length:120},function(){return{x:innerWidth/2+(Math.random()-.5)*200,y:innerHeight/2,vx:(Math.random()-.5)*11,vy:Math.random()*-13-4,g:.32+Math.random()*.2,s:5+Math.random()*7,c:cols[Math.random()*cols.length|0],r:Math.random()*6,vr:(Math.random()-.5)*.4};});
  let t=0;
  (function loop(){
    ctx.clearRect(0,0,cv.width,cv.height); t++;
    P.forEach(function(p){p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r);ctx.fillStyle=p.c;ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6);ctx.restore();});
    if(t<120) requestAnimationFrame(loop); else cv.classList.add('hidden');
  })();
}

    '<div id="mReveal"></div>'+
  '</div>';
  mock.timer=setInterval(function(){mock.sec--;var m=Math.floor(mock.sec/60),s=String(mock.sec%60).padStart(2,'0');var el=document.getElementById('mTimer');if(!el){clearInterval(mock.timer);return;}el.textContent='⏱️ '+m+':'+s;if(mock.sec<=10)el.classList.add('text-red-500');if(mock.sec<=0){clearInterval(mock.timer);el.textContent='⏱️ time!';}},1000);
}
function revealModel(){var x=mock.qs[mock.i];document.getElementById('mReveal').innerHTML=card('<div class="p-4 text-sm"><b class="text-xs uppercase text-slate-400">Model strike</b><p class="mt-1">'+x.a+'</p><p class="mt-2 text-xs italic text-amber-600">💡 '+x.w+'</p></div>','mt-1');}
function nextMock(){var a=document.getElementById('mAns');if(a)mock.answers[mock.i]=a.value;mock.i++;paintMock();}
function finishMock(){
  clearInterval(mock.timer);
  var answered=mock.answers.filter(function(a){return a&&a.trim().length>15;}).length;
  awardBadge('interview'); earn(60,'Boss battle survived!',false);
  document.getElementById('content').innerHTML=
  '<div class="max-w-lg mx-auto text-center fadein space-y-4">'+
    '<div class="text-6xl pop">🐉</div><h3 class="text-2xl font-extrabold gradtext">Boss battle complete!</h3>'+
    '<p class="text-slate-500">You struck back at <b>'+answered+'/'+mock.qs.length+'</b> dragons. The reps build courage — return 2–3× a week.</p>'+
    card('<div class="p-5 text-left text-sm space-y-2"><b>Quick self-review:</b><ul class="list-disc pl-5 text-slate-500 space-y-1"><li>Did you name a <b>real Infosys example</b>?</li><li>Did you explain the <b>"why"</b>, not just the T-code?</li><li>Did you mention <b>S/4HANA</b> where relevant?</li></ul></div>')+
    '<div class="flex gap-3 justify-center"><button onclick="startMock()" class="tap px-5 py-3 rounded-xl gradbg text-white font-bold">10 more 🔁</button><button onclick="renderInterview()" class="tap px-5 py-3 rounded-xl bg-slate-100 dark:bg-slate-800 font-bold">Back</button></div>'+
  '</div>';
}

/* =====================================================================
   TRAINING GROUNDS (quizzes)
   ===================================================================== */
var qz={key:null,i:0,score:0};
function renderQuizzes(){
  document.getElementById('content').innerHTML=
  '<div class="space-y-5 fadein">'+
    intro('🎯','The Training Grounds','Sharpen your blade before the real battles. Score 80%+ for the Sharpshooter trophy. The P2P ordering game lives in the P2P Quest.')+
    '<div class="grid grid-cols-1 sm:grid-cols-2 gap-4 stagger">'+
    Object.keys(QUIZZES).map(function(k){var q=QUIZZES[k];return '<button onclick="startQuiz(\''+k+'\')" class="cardtap w-full text-left p-5 bg-white dark:bg-slate-900/90 rounded-2xl border border-slate-200 dark:border-slate-800"><div class="flex items-center justify-between"><div class="text-3xl">'+q.emoji+'</div>'+pill(q.q.length+' Qs','bg-sap-50 dark:bg-sap-500/15 text-sap-600')+'</div><h4 class="font-bold mt-2">'+q.title+'</h4><div class="text-xs text-slate-500 mt-1">'+(S.quiz[k]!=null?'Best: '+S.quiz[k]+'%':'Not attempted yet')+'</div><div class="text-sm font-bold text-sap-500 mt-2">Train →</div></button>';}).join('')+'</div>'+
    card('<div class="p-5 flex items-center gap-4"><div class="text-3xl">🧩</div><div class="flex-1"><b>P2P Ordering Game</b><p class="text-xs text-slate-500">Order the 7 trials — +₹50 and the P2P Champion trophy.</p></div><button onclick="go(\'p2p\')" class="tap px-4 py-3 rounded-xl gradbg text-white font-bold text-sm">Open →</button></div>')+
  '</div>';
}
function startQuiz(k){qz={key:k,i:0,score:0};paintQuiz();}
function paintQuiz(){
  var bank=QUIZZES[qz.key];
  if(qz.i>=bank.q.length)return finishQuiz();
  var x=bank.q[qz.i];
  document.getElementById('content').innerHTML=
  '<div class="max-w-xl mx-auto fadein space-y-4">'+
    '<div class="flex items-center justify-between"><button onclick="renderQuizzes()" class="tap text-sm font-semibold text-slate-500">← Training</button><span class="font-bold text-slate-400 text-sm">'+(qz.i+1)+' / '+bank.q.length+' · hits '+qz.score+'</span></div>'+
    '<div class="h-2 rounded-full bg-slate-200 dark:bg-slate-800 overflow-hidden"><div class="h-full shine" style="width:'+(qz.i/bank.q.length*100)+'%"></div></div>'+
    card('<div class="p-6"><div class="text-xs uppercase tracking-wide text-sap-500 font-bold">'+bank.emoji+' '+bank.title+'</div><h3 class="text-lg font-bold mt-2 leading-snug">'+x.q+'</h3><div class="grid gap-2 mt-4">'+x.o.map(function(o,oi){return '<button onclick="answerQuiz('+oi+')" class="qopt tap text-left px-4 py-3 rounded-xl bg-slate-100 dark:bg-slate-800 transition font-medium text-sm min-h-[48px]" data-i="'+oi+'">'+String.fromCharCode(65+oi)+'. '+o+'</button>';}).join('')+'</div></div>')+
  '</div>';
}
function answerQuiz(oi){
  var bank=QUIZZES[qz.key], x=bank.q[qz.i];
  document.querySelectorAll('.qopt').forEach(function(b){b.style.pointerEvents='none';var i=+b.dataset.i;if(i===x.a){b.classList.add('bg-green-100','dark:bg-green-500/20','text-green-700','dark:text-green-300','ring-2','ring-green-500');}else if(i===oi){b.classList.add('bg-red-100','dark:bg-red-500/20','text-red-700','dark:text-red-300');}});
  if(oi===x.a){qz.score++;haptic(40);sndCorrect();earn(10,'',false);toast('Hit!','+₹10','🎯');}else{haptic(30);sndWrong();toast('Missed','See the green one','❌');}
  save();
  setTimeout(function(){qz.i++;paintQuiz();},900);
}
function finishQuiz(){
  var bank=QUIZZES[qz.key], pct=Math.round(qz.score/bank.q.length*100);
  if(S.quiz[qz.key]==null||pct>S.quiz[qz.key]){S.quiz[qz.key]=pct;save();}
  if(pct>=80){confetti();sndComplete();awardBadge('quiz');}
  document.getElementById('content').innerHTML=
  '<div class="max-w-md mx-auto text-center fadein space-y-4">'+
    '<div class="text-6xl pop">'+(pct>=80?'🏆':pct>=50?'🎯':'💪')+'</div><h3 class="text-2xl font-extrabold gradtext">'+qz.score+' / '+bank.q.length+' hits</h3>'+
    '<p class="text-slate-500">'+(pct>=80?'Excellent — sharp blade!':pct>=50?'Solid. One more run to master it.':'Good start — review and retry.')+'</p>'+
    '<div class="text-4xl font-extrabold goldtext">'+pct+'%</div>'+
    '<div class="flex gap-3 justify-center"><button onclick="startQuiz(\''+qz.key+'\')" class="tap px-5 py-3 rounded-xl gradbg text-white font-bold">Retry 🔁</button><button onclick="renderQuizzes()" class="tap px-5 py-3 rounded-xl bg-slate-100 dark:bg-slate-800 font-bold">More</button></div>'+
  '</div>';
}

/* =====================================================================
   CLAIM THE CROWN (job kit)
   ===================================================================== */
function renderJobkit(){
  var salary=[['Fresher / 0–1 yr','₹3.5–6 LPA','Support & testing'],['Associate / 2–3 yr','₹5–9 LPA','Real project work begins'],['Consultant / 4–5 yr','₹10–15 LPA','Client-facing, config'],['Senior / 6–10 yr','₹18–28 LPA','Design & lead'],['Lead / Architect 10+','₹30–50 LPA+','Full-cycle / solutioning']];
  document.getElementById('content').innerHTML=
  '<div class="space-y-5 fadein">'+
    intro('👑','Claim Your Crown','Turn your powers into a royal offer. India 2026 market — Pune is a top-paying kingdom, so you are well placed, champion.')+
    card('<div class="p-5"><h4 class="font-bold mb-3">💰 SAP FICO treasure map — India (2026)</h4><div class="overflow-hidden rounded-xl border border-slate-200 dark:border-slate-800">'+salary.map(function(r,i){return '<div class="flex items-center gap-3 px-4 py-3 text-sm '+(i%2?'bg-slate-50 dark:bg-slate-800/40':'')+'"><div class="flex-1 font-semibold">'+r[0]+'</div><div class="font-bold goldtext">'+r[1]+'</div><div class="hidden sm:block text-xs text-slate-400 w-40">'+r[2]+'</div></div>';}).join('')+'</div><p class="text-xs text-slate-400 mt-2">💡 S/4HANA skills add a ~20–30% premium. Bangalore, Pune & Hyderabad pay the most.</p></div>')+
    '<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">'+
      card('<div class="p-5"><h4 class="font-bold mb-2">📄 Resume spells</h4><ul class="text-sm space-y-2 text-slate-600 dark:text-slate-300"><li>▹ Lead with <b>impact</b>: "Processed 200+ vendor invoices/day in MIRO at 99% accuracy."</li><li>▹ Keywords: <span class="font-mono text-xs">P2P, MIRO, FB60, MIGO, GR/IR, F110, S/4HANA, ACDOCA, UAT</span>.</li><li>▹ Reframe support as <b>functional</b>: "Resolved blocked invoices by analyzing PO–GR–invoice variances."</li><li>▹ Add a <b>Skills</b> band + any testing/UAT experience.</li></ul></div>')+
      card('<div class="p-5"><h4 class="font-bold mb-2">🔗 LinkedIn enchantment</h4><ul class="text-sm space-y-2 text-slate-600 dark:text-slate-300"><li>▹ Headline: <i>"SAP FICO Consultant | S/4HANA | P2P &amp; AP | Infosys"</i></li><li>▹ Turn on "Open to work".</li><li>▹ Post one short learning weekly.</li><li>▹ Connect with SAP recruiters in Pune/Bangalore.</li></ul></div>')+
    '</div>'+
    '<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">'+
      card('<div class="p-5"><h4 class="font-bold mb-2">🗣️ Recruiter dragons</h4><ul class="text-sm space-y-2 text-slate-600 dark:text-slate-300"><li>▹ "Walk me through your day." → P2P + tools.</li><li>▹ "Implementation or support?" → honest + config curiosity.</li><li>▹ "S/4HANA exposure?" → ACDOCA, BP, what you studied.</li><li>▹ "Notice period & CTC?" → know your number.</li></ul></div>')+
      card('<div class="p-5"><h4 class="font-bold mb-2">🤝 Treaty (negotiation)</h4><ul class="text-sm space-y-2 text-slate-600 dark:text-slate-300"><li>▹ Anchor on <b>market + S/4HANA premium</b>, not just current CTC.</li><li>▹ Target a <b>30–50% hike</b> when switching with a niche skill.</li><li>▹ Get the offer in writing before resigning.</li><li>▹ Negotiate total CTC (joining bonus, variable), not just base.</li></ul></div>')+
    '</div>'+
    card('<div class="p-5 text-center"><p class="text-sm text-slate-500 mb-3">Ready to claim the crown?</p><button onclick="markReadyJob()" class="tap px-6 py-3 rounded-xl gradbg text-white font-bold">I am battle-ready ✓ (+₹40 💰)</button></div>')+
  '</div>';
}
function markReadyJob(){if(S.done.indexOf('jobready')<0){S.done.push('jobready');save();earn(40,'Crown within reach — go win it!',false);}else toast('Already done','','👍');}

/* =====================================================================
   INIT
   ===================================================================== */
function makeStars(){var h='';for(var i=0;i<55;i++){var s=(Math.random()*2+1).toFixed(1);h+='<span class="star" style="top:'+(Math.random()*100).toFixed(1)+'%;left:'+(Math.random()*100).toFixed(1)+'%;width:'+s+'px;height:'+s+'px;animation-delay:'+(Math.random()*4).toFixed(1)+'s"></span>';}document.getElementById('stars').innerHTML=h;}
function computeStreak(){var today=new Date().toISOString().slice(0,10);if(S.last!==today){var y=new Date(Date.now()-864e5).toISOString().slice(0,10);if(S.last===y)S.streak=(S.streak||0)+1;else S.streak=1;S.last=today;save();if(S.streak>1)toast('Streak: '+S.streak+' days 🔥','Welcome back, hero!','🔥');}checkStreakBadge();}
// resume audio + light haptic on first interaction (WebView/browser autoplay policy)
document.addEventListener('pointerdown',function(e){ensureAudio();var b=(e.target&&e.target.closest)?e.target.closest('button'):null;if(b)haptic(20);},true);
(async function init(){
  await load();
  if(S.theme==='light'){document.documentElement.classList.remove('dark');var ti=document.getElementById('themeIcon');if(ti)ti.textContent='☀️';}
  var si=document.getElementById('soundIcon');if(si)si.textContent=S.sound?'🔊':'🔇';
  makeStars();
  buildNav();
  computeStreak();
  paintHeader();
  go('dashboard');
  setTimeout(function(){awardBadge('first');},600);
})();
</script>
</body>
